<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta id="apple-title" name="apple-mobile-web-app-title" content="Mindful Pause">
  <link id="apple-touch-icon" rel="apple-touch-icon" href="icons/instagram.png">
  <link id="app-manifest" rel="manifest" href="">
  <link rel="stylesheet" href="v2.css">
  <title>Mindful Pause</title>
</head>
<body class="bump-page">
  <main class="card bump-card centered">
    <h1 id="headline">This is your pause.</h1>
    <p id="message">You can check that app later. Right now, take one breath and look up.</p>
    <div id="bump-icon" class="bump-icon" aria-hidden="true">🌿</div>
    <p id="counter" class="hint"></p>
  </main>
  <footer class="bump-footer">
    <p id="install-hint" class="hint install-hint" hidden></p>
    <button id="reset" class="subtle-link smaller" type="button">Reset weekly count</button>
  </footer>

  <script src="fake.js"></script>
</body>
</html>
